<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Portal Pesantren</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* =========================================================================
   TOKENS
   ========================================================================= */
:root{
  --ink:#1B2B26;
  --ink-soft:#5B6B63;
  --ink-faint:#8A9690;
  --bg:#F6F1E7;
  --surface:#FFFFFF;
  --surface-2:#FBF8F0;
  --primary:#0E6E4F;
  --primary-dark:#0A4F39;
  --primary-soft:#E3F0E8;
  --accent:#C9962B;
  --accent-soft:#F6ECD3;
  --danger:#B3412B;
  --danger-soft:#F6E2DC;
  --success:#2F8F5B;
  --success-soft:#E3F0E8;
  --warning:#C9962B;
  --warning-soft:#F6ECD3;
  --border:#E6DDC8;
  --radius:18px;
  --radius-sm:12px;
  --shadow: 0 10px 28px rgba(27,43,38,0.10);
  --shadow-sm: 0 4px 10px rgba(27,43,38,0.06);
  --font-display:'Sora', sans-serif;
  --font-body:'Plus Jakarta Sans', sans-serif;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:var(--font-body);
  background:var(--bg);
  color:var(--ink);
  -webkit-tap-highlight-color:transparent;
  overscroll-behavior-y:none;
}
h1,h2,h3,h4{font-family:var(--font-display); margin:0; color:var(--ink); letter-spacing:-0.01em;}
p{margin:0;}
button{font-family:inherit; cursor:pointer;}
input,select,textarea{font-family:inherit;}
a{color:inherit;}

/* signature motif: scalloped arch strip (mihrab silhouette) */
.arch-strip{
  height:13px;
  background-image: radial-gradient(circle at 11px 0, transparent 9px, var(--primary) 9.5px);
  background-size: 22px 13px;
  background-repeat: repeat-x;
  background-position: center top;
}
.arch-strip.light{
  background-image: radial-gradient(circle at 11px 0, transparent 9px, rgba(255,255,255,0.55) 9.5px);
}

/* =========================================================================
   LAYOUT SHELLS
   ========================================================================= */
#root{min-height:100vh; display:flex; flex-direction:column;}

.center-screen{
  min-height:100vh;
  display:flex; align-items:center; justify-content:center;
  padding:28px 18px;
  background:
    radial-gradient(circle at 15% 8%, rgba(201,150,43,0.10), transparent 45%),
    radial-gradient(circle at 85% 92%, rgba(14,110,79,0.10), transparent 45%),
    var(--bg);
}

/* =========================================================================
   LOGIN
   ========================================================================= */
.login-card{
  width:100%; max-width:380px;
  background:var(--surface);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  overflow:hidden;
  border:1px solid var(--border);
}
.login-head{
  background:linear-gradient(155deg, var(--primary) 0%, var(--primary-dark) 100%);
  padding:34px 28px 22px;
  text-align:center;
  color:#fff;
  position:relative;
}
.login-badge{
  width:56px; height:56px; margin:0 auto 14px;
  border-radius:16px;
  background:rgba(255,255,255,0.16);
  display:flex; align-items:center; justify-content:center;
  border:1px solid rgba(255,255,255,0.25);
}
.login-badge svg{width:28px; height:28px;}
.login-head h1{font-size:21px; font-weight:700; color:#fff;}
.login-head p{font-size:13px; color:rgba(255,255,255,0.78); margin-top:4px;}
.login-body{padding:26px 28px 28px;}

.field{margin-bottom:16px;}
.field label{
  display:block; font-size:12.5px; font-weight:600; color:var(--ink-soft);
  margin-bottom:6px; text-transform:uppercase; letter-spacing:0.04em;
}
.field input, .field select, .field textarea{
  width:100%;
  padding:11px 13px;
  border:1.5px solid var(--border);
  border-radius:var(--radius-sm);
  font-size:15px;
  color:var(--ink);
  background:var(--surface-2);
  outline:none;
  transition:border-color .15s, background .15s;
}
.field input:focus, .field select:focus, .field textarea:focus{
  border-color:var(--primary);
  background:#fff;
}
.field-hint{font-size:12px; color:var(--ink-faint); margin-top:5px; line-height:1.4;}

.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  padding:12px 18px;
  border-radius:var(--radius-sm);
  border:none;
  font-size:14.5px; font-weight:700;
  transition:transform .12s, box-shadow .12s, opacity .12s;
}
.btn:active{transform:scale(0.98);}
.btn-primary{background:var(--primary); color:#fff; box-shadow:0 6px 16px rgba(14,110,79,0.30);}
.btn-primary:hover{background:var(--primary-dark);}
.btn-block{width:100%;}
.btn-ghost{background:transparent; color:var(--primary); border:1.5px solid var(--primary-soft);}
.btn-ghost:hover{background:var(--primary-soft);}
.btn-outline{background:#fff; color:var(--ink); border:1.5px solid var(--border);}
.btn-outline:hover{border-color:var(--primary);}
.btn-danger-ghost{background:var(--danger-soft); color:var(--danger); border:1.5px solid transparent;}
.btn-sm{padding:8px 13px; font-size:13px;}
.btn:disabled{opacity:0.55; cursor:not-allowed;}

.login-error{
  background:var(--danger-soft); color:var(--danger);
  border-radius:var(--radius-sm); padding:10px 13px;
  font-size:13.5px; margin-bottom:14px; display:none; font-weight:600;
}

details.server-settings{margin-top:18px; border-top:1px dashed var(--border); padding-top:14px;}
details.server-settings summary{
  cursor:pointer; font-size:13px; font-weight:700; color:var(--ink-soft);
  list-style:none; display:flex; align-items:center; gap:6px;
}
details.server-settings summary::-webkit-details-marker{display:none;}
.server-status{
  display:inline-flex; align-items:center; gap:6px;
  font-size:12.5px; font-weight:600; margin-top:10px; padding:6px 10px;
  border-radius:99px; background:var(--surface-2);
}
.dot{width:7px; height:7px; border-radius:50%; background:var(--ink-faint); flex:none;}
.dot.ok{background:var(--success);}
.dot.bad{background:var(--danger);}

/* =========================================================================
   APP SHELL
   ========================================================================= */
.app-shell{display:flex; flex-direction:column; min-height:100vh;}

.app-header{
  background:linear-gradient(155deg, var(--primary) 0%, var(--primary-dark) 100%);
  color:#fff;
  padding:18px 18px 16px;
  position:sticky; top:0; z-index:20;
}
.app-header-row{display:flex; align-items:center; justify-content:space-between; gap:10px;}
.app-id{display:flex; align-items:center; gap:11px;}
.app-id .avatar{
  width:42px; height:42px; border-radius:13px;
  background:rgba(255,255,255,0.18); border:1px solid rgba(255,255,255,0.28);
  display:flex; align-items:center; justify-content:center;
  font-family:var(--font-display); font-weight:700; font-size:16px;
}
.app-id .who .greet{font-size:11.5px; color:rgba(255,255,255,0.72); font-weight:600; letter-spacing:.03em; text-transform:uppercase;}
.app-id .who .name{font-size:16px; font-weight:700; font-family:var(--font-display); margin-top:1px;}
.role-chip{
  display:inline-flex; margin-top:3px;
  font-size:11px; font-weight:700; padding:2px 9px; border-radius:99px;
  background:rgba(255,255,255,0.18); color:#fff;
}
.icon-btn{
  width:38px; height:38px; border-radius:12px;
  background:rgba(255,255,255,0.14); border:1px solid rgba(255,255,255,0.22);
  display:flex; align-items:center; justify-content:center; color:#fff;
  flex:none;
}
.icon-btn svg{width:18px; height:18px;}

.page-title{padding:18px 18px 4px;}
.page-title h2{font-size:19px;}
.page-title p{font-size:13px; color:var(--ink-soft); margin-top:3px;}

.app-main{flex:1; padding:14px 16px 100px; max-width:680px; width:100%; margin:0 auto;}

/* bottom nav */
.bottom-nav{
  position:fixed; left:0; right:0; bottom:0; z-index:30;
  background:var(--surface);
  border-top:1px solid var(--border);
  display:flex;
  padding:7px 10px calc(7px + env(safe-area-inset-bottom));
  box-shadow:0 -8px 24px rgba(27,43,38,0.08);
}
.nav-item{
  flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;
  padding:7px 4px; border-radius:12px; background:none; border:none;
  color:var(--ink-faint); font-size:11.5px; font-weight:600;
}
.nav-item svg{width:21px; height:21px;}
.nav-item.active{color:var(--primary); background:var(--primary-soft);}

/* =========================================================================
   CARDS / SECTIONS
   ========================================================================= */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  box-shadow:var(--shadow-sm);
  padding:18px;
  margin-bottom:14px;
}
.card-head{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:12px;}
.card-head h3{font-size:15px;}
.card-sub{font-size:12.5px; color:var(--ink-soft);}

.profile-card{text-align:center; padding-top:26px;}
.profile-photo{
  width:92px; height:92px; border-radius:26px; margin:0 auto 14px;
  background:var(--primary-soft); color:var(--primary);
  display:flex; align-items:center; justify-content:center;
  font-family:var(--font-display); font-weight:800; font-size:30px;
  border:3px solid #fff; box-shadow:var(--shadow-sm);
}
.profile-name{font-size:18px; font-weight:700;}
.profile-sub{font-size:13px; color:var(--ink-soft); margin-top:3px;}
.profile-badge{
  display:inline-block; margin-top:10px; font-size:12px; font-weight:700;
  padding:4px 12px; border-radius:99px; background:var(--accent-soft); color:#8a6a1c;
}
.detail-list{margin-top:18px; border-top:1px solid var(--border); padding-top:6px;}
.detail-row{
  display:flex; justify-content:space-between; gap:14px;
  padding:11px 2px; border-bottom:1px solid var(--border);
  font-size:13.5px; text-align:left;
}
.detail-row:last-child{border-bottom:none;}
.detail-row .k{color:var(--ink-soft); font-weight:600; flex:none; width:42%;}
.detail-row .v{color:var(--ink); font-weight:600; text-align:right; flex:1;}
.detail-row .v.empty{color:var(--ink-faint); font-weight:500; font-style:italic;}

/* segmented tabs (histori pembayaran) */
.seg{
  display:flex; gap:6px; background:var(--surface-2); padding:5px;
  border-radius:14px; margin-bottom:14px; border:1px solid var(--border);
}
.seg button{
  flex:1; padding:9px 6px; border:none; background:none; border-radius:10px;
  font-size:12.5px; font-weight:700; color:var(--ink-soft);
}
.seg button.active{background:var(--primary); color:#fff; box-shadow:0 4px 10px rgba(14,110,79,0.25);}

/* summary strip */
.summary-strip{
  display:flex; align-items:center; justify-content:space-between;
  background:var(--primary-soft); border-radius:var(--radius-sm);
  padding:13px 15px; margin-bottom:14px;
}
.summary-strip .label{font-size:12.5px; color:var(--primary-dark); font-weight:700;}
.summary-strip .amount{font-family:var(--font-display); font-size:18px; font-weight:800; color:var(--primary-dark);}

/* list rows (payment / nilai) */
.row-item{
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm);
  padding:13px 14px; margin-bottom:10px;
}
.row-item-top{display:flex; align-items:flex-start; justify-content:space-between; gap:10px;}
.row-item-title{font-size:14.5px; font-weight:700;}
.row-item-meta{font-size:12px; color:var(--ink-soft); margin-top:3px;}
.row-item-amount{font-family:var(--font-display); font-weight:800; font-size:15.5px; white-space:nowrap;}
.row-item-foot{
  display:flex; align-items:center; justify-content:space-between;
  margin-top:10px; padding-top:10px; border-top:1px dashed var(--border);
  font-size:12px; color:var(--ink-soft);
}

.badge{
  display:inline-flex; align-items:center; gap:4px;
  font-size:11.5px; font-weight:700; padding:4px 10px; border-radius:99px;
}
.badge-success{background:var(--success-soft); color:var(--success);}
.badge-danger{background:var(--danger-soft); color:var(--danger);}
.badge-warning{background:var(--warning-soft); color:#8a6a1c;}
.badge-muted{background:var(--surface-2); color:var(--ink-faint);}

.score-pill{
  font-family:var(--font-display); font-weight:800; font-size:16px;
  padding:6px 13px; border-radius:12px; white-space:nowrap;
}
.score-pill.high{background:var(--success-soft); color:var(--success);}
.score-pill.mid{background:var(--warning-soft); color:#8a6a1c;}
.score-pill.low{background:var(--danger-soft); color:var(--danger);}
.score-pill.none{background:var(--surface-2); color:var(--ink-faint); font-size:12px; font-weight:600;}

/* mapel cards (guru) */
.mapel-card{
  border:1px solid var(--border); border-radius:var(--radius-sm);
  padding:15px; margin-bottom:12px; background:var(--surface);
}
.mapel-top{display:flex; align-items:center; justify-content:space-between; gap:10px;}
.mapel-name{font-size:15.5px; font-weight:700;}
.mapel-class{
  font-size:11.5px; font-weight:700; color:var(--primary);
  background:var(--primary-soft); padding:3px 10px; border-radius:99px; white-space:nowrap;
}
.mapel-meta{display:flex; flex-wrap:wrap; gap:14px; margin-top:11px;}
.mapel-meta-item{font-size:12.5px; color:var(--ink-soft); display:flex; align-items:center; gap:6px;}
.mapel-meta-item svg{width:14px; height:14px; flex:none;}
.mapel-actions{margin-top:13px; display:flex; gap:8px;}

/* input nilai table */
.nilai-table-wrap{overflow-x:auto; border:1px solid var(--border); border-radius:var(--radius-sm);}
table.nilai-table{width:100%; border-collapse:collapse; min-width:480px;}
table.nilai-table th{
  background:var(--surface-2); font-size:11.5px; text-transform:uppercase; letter-spacing:.03em;
  color:var(--ink-soft); text-align:left; padding:10px 12px; border-bottom:1px solid var(--border);
}
table.nilai-table td{padding:9px 12px; border-bottom:1px solid var(--border); font-size:13.5px; vertical-align:middle;}
table.nilai-table tr:last-child td{border-bottom:none;}

/* empty / loading states */
.empty-state{
  text-align:center; padding:48px 18px; color:var(--ink-soft);
}
.empty-state svg{width:44px; height:44px; color:var(--ink-faint); margin-bottom:12px;}
.empty-state .t{font-weight:700; color:var(--ink); margin-bottom:4px; font-size:14.5px;}
.empty-state .s{font-size:13px;}

.skeleton{
  background:linear-gradient(90deg, var(--surface-2) 25%, var(--border) 37%, var(--surface-2) 63%);
  background-size:400% 100%; animation:shimmer 1.4s ease infinite;
  border-radius:10px;
}
@keyframes shimmer{0%{background-position:100% 50%;}100%{background-position:0 50%;}}
.skel-row{height:62px; margin-bottom:10px;}

/* toast */
#toast-wrap{
  position:fixed; top:14px; left:0; right:0; z-index:200;
  display:flex; flex-direction:column; align-items:center; gap:8px; pointer-events:none;
}
.toast{
  pointer-events:auto;
  max-width:320px; width:calc(100% - 32px);
  background:var(--ink); color:#fff;
  font-size:13.5px; font-weight:600;
  padding:12px 16px; border-radius:12px;
  box-shadow:0 10px 24px rgba(0,0,0,0.22);
  display:flex; align-items:center; gap:9px;
  animation:toastIn .22s ease;
}
.toast.success{background:var(--primary-dark);}
.toast.error{background:#7A2C1B;}
@keyframes toastIn{from{opacity:0; transform:translateY(-8px);} to{opacity:1; transform:translateY(0);}}

.divider-label{
  font-size:11.5px; font-weight:700; text-transform:uppercase; letter-spacing:.05em;
  color:var(--ink-faint); margin:18px 2px 10px;
}

.section-fade{animation:fadeUp .22s ease;}
@keyframes fadeUp{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}

@media (max-width:380px){
  .login-head{padding:28px 20px 18px;}
  .login-body{padding:20px 20px 24px;}
}
</style>
</head>
<body>
<div id="toast-wrap"></div>
<div id="root"></div>
<script>
/* =========================================================================
   PORTAL PESANTREN — APP LOGIC
   Single-file app, vanilla JS, backend via Google Apps Script (GAS).
   ========================================================================= */

/* ---------------------------- STATE & STORAGE --------------------------- */
var LS_GAS_URL = 'gasUrl';
var LS_SESSION = 'session';

function getGasUrl(){ return localStorage.getItem(LS_GAS_URL) || ''; }
function setGasUrl(v){ localStorage.setItem(LS_GAS_URL, v); }
function getSession(){ try{ return JSON.parse(localStorage.getItem(LS_SESSION) || 'null'); }catch(e){ return null; } }
function setSession(u){ localStorage.setItem(LS_SESSION, JSON.stringify(u)); }
function clearSession(){ localStorage.removeItem(LS_SESSION); }

var STATE = {
  user: getSession(),
  tab: null,        // current bottom-nav tab
  histJenis: 'sppsekolah', // sub-tab for histori pembayaran
  cache: {}         // simple in-memory cache per session
};

/* --------------------------------- UTIL --------------------------------- */
function qs(sel, root){ return (root||document).querySelector(sel); }
function qsa(sel, root){ return Array.prototype.slice.call((root||document).querySelectorAll(sel)); }
function escHtml(str){
  if (str === null || str === undefined) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function rupiah(n){
  n = Number(n) || 0;
  return 'Rp ' + n.toLocaleString('id-ID');
}
var BULAN_ID = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
function tanggalID(str){
  if (!str) return '-';
  var d = new Date(str);
  if (isNaN(d.getTime())) return String(str);
  return d.getDate() + ' ' + BULAN_ID[d.getMonth()] + ' ' + d.getFullYear();
}
function initials(name){
  if (!name) return '?';
  var parts = String(name).trim().split(/\s+/);
  var s = parts[0].charAt(0);
  if (parts.length > 1) s += parts[parts.length-1].charAt(0);
  return s.toUpperCase();
}
function statusInfo(status){
  if (status === 'terima') return { label:'Diterima', cls:'badge-success' };
  if (status === 'tolak')  return { label:'Ditolak',  cls:'badge-danger' };
  return { label:'Menunggu', cls:'badge-warning' };
}
function scorePillClass(n){
  if (n === null || n === undefined || n === '') return 'none';
  n = Number(n);
  if (n >= 75) return 'high';
  if (n >= 60) return 'mid';
  return 'low';
}

/* --------------------------------- TOAST --------------------------------- */
function toast(msg, type){
  var wrap = qs('#toast-wrap');
  var el = document.createElement('div');
  el.className = 'toast' + (type ? ' ' + type : '');
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(function(){
    el.style.transition = 'opacity .25s, transform .25s';
    el.style.opacity = '0';
    el.style.transform = 'translateY(-8px)';
    setTimeout(function(){ el.remove(); }, 250);
  }, 2600);
}

/* ---------------------------------- API ---------------------------------- */
/**
 * Memanggil backend (GAS atau langsung receiver.php).
 * Backend PHP (receiver.php) selalu membalas dengan format:
 *   { success: bool, message: string, ...extra }
 * Untuk kompatibilitas dengan kode di file ini yang memeriksa
 * `res.ok` / `res.msg`, setiap respons dinormalisasi di sini sehingga
 * SELALU memiliki properti `ok` (alias success) dan `msg` (alias message),
 * di samping properti aslinya (success/message/data/dst tetap ada).
 */
function normalizeApiResponse(res){
  if (!res || typeof res !== 'object') return res;
  if (res.ok === undefined)  res.ok  = (res.success === undefined) ? false : !!res.success;
  if (res.msg === undefined) res.msg = res.message || '';
  return res;
}

/**
 * Backend (receiver.php & Code.gs) menggunakan penamaan action snake_case
 * (mis. get_nilai, get_mapel_guru, simpan_nilai_batch), sedangkan kode di
 * file ini menulis pemanggilan action dengan gaya camelCase (mis. getNilai,
 * getMapelGuru, simpanNilaiBatch) agar konsisten dengan gaya JS pada
 * umumnya. Fungsi ini menjembatani keduanya secara otomatis sehingga
 * kedua sisi tidak perlu disamakan manual satu per satu.
 */
function toSnakeCaseAction(action){
  return String(action).replace(/[A-Z]/g, function(c){ return '_' + c.toLowerCase(); });
}

function apiCall(action, payload){
  var url = getGasUrl();
  if (!url){
    toast('URL Apps Script belum diatur. Buka halaman Profil untuk mengaturnya.', 'error');
    return Promise.reject(new Error('GAS URL belum diatur'));
  }
  var body = Object.assign({ action: toSnakeCaseAction(action) }, payload || {});
  return fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // hindari preflight CORS
    body: JSON.stringify(body)
  })
  .then(function(res){
    if (!res.ok && res.status >= 500){
      // server error HTTP (bukan field res.ok dari JSON, ini status HTTP fetch)
      throw new Error('Server error HTTP ' + res.status);
    }
    return res.text();
  })
  .then(function(text){
    var parsed;
    try { parsed = JSON.parse(text); }
    catch (e) {
      throw new Error('Respons server bukan JSON yang valid: ' + text.substring(0, 150));
    }
    return normalizeApiResponse(parsed);
  })
  .catch(function(err){
    toast('Gagal terhubung ke server. Periksa URL Apps Script di halaman Profil.', 'error');
    throw err;
  });
}

/* ================================ ROUTER ================================= */
function boot(){
  STATE.user = getSession();
  if (STATE.user){
    renderShell();
  } else {
    renderLogin();
  }
}

function goLogout(){
  clearSession();

  root.innerHTML =

      '<div class="login-card section-fade">' +
        '<div class="login-head">' +
          '<div class="login-badge">' + iconMosque() + '</div>' +

          '<p>Nilai &middot; Pembayaran &middot; Profil Santri</p>' +
        '</div>' +
        '<div class="arch-strip"></div>' +
        '<div class="login-body">' +
          '<div class="login-error" id="loginError"></div>' +
          '<div class="field">' +
            '<label>Username</label>' +
            '<input type="text" id="inpUsername" autocomplete="username" placeholder="Masukkan username">' +
          '</div>' +
          '<div class="field">' +
            '<label>Password</label>' +
            '<input type="password" id="inpPassword" autocomplete="current-password" placeholder="Masukkan password">' +
          '</div>' +
          '<button class="btn btn-primary btn-block" id="btnLogin" onclick="doLogin()">Masuk</button>' +

          '<details class="server-settings" id="serverSettings" ' + (savedUrl ? '' : 'open') + '>' +
            '<summary>' + iconGear() + ' Pengaturan Server (Google Apps Script)</summary>' +
            '<div class="field" style="margin-top:12px;">' +
              '<label>URL Web App GAS</label>' +
              '<input type="text" id="inpGasUrlLogin" placeholder="https://script.google.com/macros/s/.../exec" value="' + escHtml(savedUrl) + '">' +
              '<div class="field-hint">Tempel URL deployment Web App dari Google Apps Script di sini agar aplikasi bisa mengambil data sekolah.</div>' +
            '</div>' +
            '<div style="display:flex; gap:8px;">' +
              '<button class="btn btn-outline btn-sm" style="flex:1;" onclick="testGasFromLogin()">Tes Koneksi</button>' +
              '<button class="btn btn-ghost btn-sm" style="flex:1;" onclick="saveGasFromLogin()">Simpan URL</button>' +
            '</div>' +
            '<div id="loginServerStatus"></div>' +
          '</details>' +
        '</div>' +
      '</div>' +
    '</div>';

  qs('#inpPassword').addEventListener('keydown', function(e){ if (e.key === 'Enter') doLogin(); });
}

function saveGasFromLogin(){
  var v = qs('#inpGasUrlLogin').value.trim();
  if (!v){ toast('URL belum diisi.', 'error'); return; }
  setGasUrl(v);
  toast('URL server disimpan.', 'success');
}

function testGasFromLogin(){
  var v = qs('#inpGasUrlLogin').value.trim();
  if (!v){ toast('URL belum diisi.', 'error'); return; }
  setGasUrl(v);
  var box = qs('#loginServerStatus');
  box.innerHTML = '<div class="server-status"><span class="dot"></span> Menguji koneksi...</div>';
  apiCall('ping', {}).then(function(res){
    if (res && res.ok){
      box.innerHTML = '<div class="server-status"><span class="dot ok"></span> Terhubung ke server</div>';
    } else {
      box.innerHTML = '<div class="server-status"><span class="dot bad"></span> Server merespons tapi gagal</div>';
    }
  }).catch(function(){
    box.innerHTML = '<div class="server-status"><span class="dot bad"></span> Tidak dapat terhubung</div>';
  });
}

function doLogin(){
  var username = qs('#inpUsername').value.trim();
  var password = qs('#inpPassword').value;
  var errBox = qs('#loginError');
  errBox.style.display = 'none';

  if (!getGasUrl()){
    errBox.textContent = 'Atur URL Apps Script terlebih dahulu di "Pengaturan Server" di bawah.';
    errBox.style.display = 'block';
    qs('#serverSettings').setAttribute('open', '');
    return;
  }
  if (!username || !password){
    errBox.textContent = 'Username dan password wajib diisi.';
    errBox.style.display = 'block';
    return;
  }

  var btn = qs('#btnLogin');
  btn.disabled = true;
  btn.textContent = 'Memproses...';

  apiCall('login', { username: username, password: password }).then(function(res){
    btn.disabled = false;
    btn.textContent = 'Masuk';
    if (res && res.ok){
      setSession(res.user);
      STATE.user = res.user;
      STATE.cache = {};
      toast('Selamat datang, ' + res.user.nama + '!', 'success');
      renderShell();
    } else {
      errBox.textContent = (res && res.msg) ? res.msg : 'Gagal masuk.';
      errBox.style.display = 'block';
    }
  }).catch(function(){
    btn.disabled = false;
    btn.textContent = 'Masuk';
    errBox.textContent = 'Tidak dapat terhubung ke server.';
    errBox.style.display = 'block';
  });
}
window.doLogin = doLogin;
window.saveGasFromLogin = saveGasFromLogin;
window.testGasFromLogin = testGasFromLogin;

/* ================================ APP SHELL ================================ */
function roleLabel(level){
  var map = { 'Siswa':'Santri', 'Guru':'Guru', 'Admin':'Admin', 'Kepala Sekolah':'Kepala Sekolah', 'Kepala Yayasan':'Kepala Yayasan', 'Kepala Dapur':'Kepala Dapur' };
  return map[level] || level;
}
function navForRole(level){
  if (level === 'Siswa'){
    return [
      { key:'nilai',   label:'Nilai',   icon: iconBook() },
      { key:'histori', label:'Histori', icon: iconWallet() },
      { key:'profil',  label:'Profil',  icon: iconUser() }
    ];
  }
  // Guru / Admin / Kepala* dianggap mode guru
  return [
    { key:'mapel',  label:'Mapel & Jadwal', icon: iconCalendar() },
    { key:'input',  label:'Lihat Nilai',    icon: iconBook() },
    { key:'profil', label:'Profil',         icon: iconUser() }
  ];
}

function renderShell(){
  var u = STATE.user;
  var nav = navForRole(u.level);
  if (!STATE.tab) STATE.tab = nav[0].key;

  var root = qs('#root');
  root.innerHTML =
    '<div class="app-shell">' +
      '<div class="app-header">' +
        '<div class="app-header-row">' +
          '<div class="app-id">' +
            '<div class="avatar">' + escHtml(initials(u.nama)) + '</div>' +
            '<div class="who">' +
              '<div class="greet">Selamat datang</div>' +
              '<div class="name">' + escHtml(u.nama) + '</div>' +
              '<span class="role-chip">' + escHtml(roleLabel(u.level)) + '</span>' +
            '</div>' +
          '</div>' +
          '<button class="icon-btn" title="Keluar" onclick="confirmLogout()">' + iconLogout() + '</button>' +
        '</div>' +
      '</div>' +
      '<div id="pageTitle" class="page-title"></div>' +
      '<div class="app-main" id="appMain"></div>' +
      '<div class="bottom-nav" id="bottomNav"></div>' +
    '</div>';

  renderBottomNav(nav);
  renderTab(STATE.tab);
}

function renderBottomNav(nav){
  var html = nav.map(function(item){
    return '<button class="nav-item' + (STATE.tab === item.key ? ' active' : '') + '" onclick="switchTab(\'' + item.key + '\')">' +
      item.icon + '<span>' + item.label + '</span>' +
    '</button>';
  }).join('');
  qs('#bottomNav').innerHTML = html;
}

function switchTab(key){
  STATE.tab = key;
  qsa('.nav-item').forEach(function(b){ b.classList.remove('active'); });
  renderBottomNav(navForRole(STATE.user.level));
  renderTab(key);
}
window.switchTab = switchTab;

function confirmLogout(){
  if (confirm('Keluar dari aplikasi?')) goLogout();
}
window.confirmLogout = confirmLogout;

function setPageTitle(title, sub){
  qs('#pageTitle').innerHTML = '<h2>' + escHtml(title) + '</h2>' + (sub ? '<p>' + escHtml(sub) + '</p>' : '');
}

function renderTab(key){
  if (key === 'nilai') return viewNilai();
  if (key === 'histori') return viewHistori();
  if (key === 'profil') return viewProfil();
  if (key === 'mapel') return viewMapelJadwal();
  if (key === 'input') return viewLihatNilaiPilih();
}

function skeletonRows(n){
  var html = '';
  for (var i=0;i<n;i++) html += '<div class="skeleton skel-row"></div>';
  return html;
}

/* ================================ NILAI (SISWA) ============================ */
function viewNilai(){
  setPageTitle('Nilai Saya', 'Daftar nilai mata pelajaran semester ini');
  var main = qs('#appMain');
  main.innerHTML = '<div class="section-fade">' + skeletonRows(3) + '</div>';

  apiCall('getNilai', { id_pengguna: STATE.user.id_pengguna }).then(function(res){
    if (!res || !res.ok){
      main.innerHTML = emptyState(iconBook(), 'Belum bisa memuat nilai', (res && res.msg) || 'Terjadi kesalahan saat mengambil data.');
      return;
    }
    var data = res.data || [];
    if (!data.length){
      main.innerHTML = emptyState(iconBook(), 'Belum ada nilai', 'Nilai mata pelajaran akan tampil di sini setelah guru menginput.');
      return;
    }
    var html = '<div class="section-fade">';
    data.forEach(function(d){
      var cls = scorePillClass(d.nilai_akhir);
      var pillText = (d.nilai_akhir === null || d.nilai_akhir === '' || d.nilai_akhir === undefined) ? 'Belum dinilai' : Number(d.nilai_akhir).toFixed(0);
      html += '<div class="row-item">' +
        '<div class="row-item-top">' +
          '<div>' +
            '<div class="row-item-title">' + escHtml(d.nama_mapel) + '</div>' +
            '<div class="row-item-meta">Kelas ' + escHtml(d.kelas) + ' &middot; ' + escHtml(d.nama_guru) + '</div>' +
          '</div>' +
          '<div class="score-pill ' + cls + '">' + pillText + '</div>' +
        '</div>' +
        (d.catatan ? '<div class="row-item-foot"><span>' + escHtml(d.catatan) + '</span></div>' : '') +
      '</div>';
    });
    html += '</div>';
    main.innerHTML = html;
  }).catch(function(){
    main.innerHTML = emptyState(iconBook(), 'Gagal memuat', 'Periksa koneksi internet atau URL server di halaman Profil.');
  });
}

        '<div class="row-item-top">' +
          '<div>' +
            '<div class="row-item-title">' + rupiah(d.nominal) + '</div>' +

  }).catch(function(){
    box.innerHTML = emptyState(iconWallet(), 'Gagal memuat', 'Periksa koneksi internet atau URL server di halaman Profil.');
  });

// Sebelumnya disebut "Input Nilai" dan punya kotak input + tombol simpan.
// Aplikasi ini sekarang murni MENAMPILKAN data dari SQL (lewat snapshot
// Drive); guru/admin tidak lagi bisa mengubah nilai dari sini. Perubahan
// nilai harus dilakukan langsung di MySQL/panel admin, lalu disinkronkan
// ulang ke Drive. Karena itu seluruh tabel di bawah ini read-only, dan
// fungsi simpanNilaiBatch() (beserta action 'simpan_nilai_batch' di
// Code.gs) sudah dihapus/dinonaktifkan.
function viewLihatNilaiPilih(){
  setPageTitle('Lihat Nilai', 'Pilih mata pelajaran untuk melihat nilai siswa');
  var main = qs('#appMain');

  var cached = STATE.cache.mapelGuru;
  function renderPicker(data){
    if (!data || !data.length){
      main.innerHTML = emptyState(iconBook(), 'Belum ada mata pelajaran', 'Anda belum memiliki mata pelajaran untuk ditampilkan nilainya.');
      return;
    }
    var html = '<div class="section-fade">';
    data.forEach(function(m){
      html += '<div class="mapel-card" style="cursor:pointer;" onclick="bukaLihatNilaiMapel(' + m.id_mapel + ')">' +
        '<div class="mapel-top">' +
          '<div class="mapel-name">' + escHtml(m.nama_mapel) + '</div>' +
          '<span class="mapel-class">Kelas ' + escHtml(m.kelas) + '</span>' +
        '</div>' +
        '<div class="row-item-meta" style="margin-top:4px;">Diampu oleh ' + escHtml(m.nama_guru || '-') + '</div>' +
        '<div class="mapel-meta"><span class="mapel-meta-item">' + iconUsers() + escHtml(m.jumlah_siswa) + ' siswa</span></div>' +
      '</div>';
    });
    html += '</div>';
    main.innerHTML = html;
  }

  if (cached){
    renderPicker(cached);
  } else {
    main.innerHTML = '<div class="section-fade">' + skeletonRows(3) + '</div>';
    apiCall('getMapelGuru', { id_pengguna: STATE.user.id_pengguna, level: STATE.user.level }).then(function(res){
      var data = (res && res.ok) ? (res.data||[]) : [];
      STATE.cache.mapelGuru = data;
      renderPicker(data);
    }).catch(function(){
      main.innerHTML = emptyState(iconBook(), 'Gagal memuat', 'Periksa koneksi internet atau URL server di halaman Profil.');
    });
  }
}

function bukaLihatNilaiMapel(idMapel){
  STATE.tab = 'input';
  renderBottomNav(navForRole(STATE.user.level));
  setPageTitle('Lihat Nilai', 'Memuat daftar siswa...');
  var main = qs('#appMain');
  main.innerHTML = '<div class="section-fade">' + skeletonRows(4) + '</div>';

  apiCall('getSiswaUntukNilai', { id_pengguna: STATE.user.id_pengguna, id_mapel: idMapel }).then(function(res){
    if (!res || !res.ok){
      main.innerHTML = emptyState(iconBook(), 'Belum bisa memuat data', (res && res.msg) || 'Terjadi kesalahan.');
      return;
    }
    var mapel = res.mapel || {};
    var data = res.data || [];
    setPageTitle('Lihat Nilai', mapel.nama_mapel + ' \u2014 Kelas ' + mapel.kelas);

    if (!data.length){
      main.innerHTML =
        '<button class="btn btn-outline btn-sm" style="margin-bottom:12px;" onclick="switchTab(\'input\')">&larr; Pilih mapel lain</button>' +
        emptyState(iconUsers(), 'Belum ada siswa di kelas ini', 'Tidak ada siswa terdaftar pada kelas ' + escHtml(mapel.kelas) + '.');
      return;
    }

    var rows = data.map(function(s, i){
      var nilaiHtml = (s.nilai_akhir === null || s.nilai_akhir === '' || s.nilai_akhir === undefined)
        ? '<span style="color:var(--ink-faint);">Belum dinilai</span>'
        : '<strong>' + escHtml(Number(s.nilai_akhir).toFixed(0)) + '</strong>';
      var catatanHtml = s.catatan ? escHtml(s.catatan) : '<span style="color:var(--ink-faint);">-</span>';
      return '<tr>' +
        '<td>' + (i+1) + '</td>' +
        '<td>' + escHtml(s.nama) + '<br><span style="font-size:11.5px;color:var(--ink-faint);">NIS ' + escHtml(s.nis||'-') + '</span></td>' +
        '<td>' + nilaiHtml + '</td>' +
        '<td>' + catatanHtml + '</td>' +
      '</tr>';
    }).join('');

    main.innerHTML =
      '<div class="section-fade">' +
        '<button class="btn btn-outline btn-sm" style="margin-bottom:12px;" onclick="switchTab(\'input\')">&larr; Pilih mapel lain</button>' +
        '<div class="nilai-table-wrap">' +
          '<table class="nilai-table">' +
            '<thead><tr><th>No</th><th>Siswa</th><th>Nilai</th><th>Catatan</th></tr></thead>' +
            '<tbody>' + rows + '</tbody>' +
          '</table>' +
        '</div>' +
      '</div>';
  }).catch(function(){
    main.innerHTML = emptyState(iconBook(), 'Gagal memuat', 'Periksa koneksi internet atau URL server di halaman Profil.');
  });
}
window.bukaLihatNilaiMapel = bukaLihatNilaiMapel;

/* =================================== PROFIL ================================= */
function detailRow(label, value){
  var has = value !== null && value !== undefined && String(value).trim() !== '';
  return '<div class="detail-row"><span class="k">' + escHtml(label) + '</span><span class="v' + (has?'':' empty') + '">' + (has ? escHtml(value) : 'Belum diisi') + '</span></div>';
}
function fmtTglLahir(v){
  if (!v) return '';
  var d = new Date(v);
  if (isNaN(d.getTime())) return v;
  return d.getDate() + '/' + (d.getMonth()+1) + '/' + d.getFullYear();
}
function fmtWa(v){ return v ? '+62 ' + v : ''; }

  main.innerHTML =
    '<div class="section-fade">' +
      '<div class="card profile-card">' + photoHtml + bodyHtml + '</div>' +

      '<div class="divider-label">Pengaturan Koneksi</div>' +
      '<div class="card">' +
        '<div class="card-head"><h3>URL Web App Google Apps Script</h3></div>' +
        '<div class="field">' +
          '<input type="text" id="inpGasUrlProfil" placeholder="https://script.google.com/macros/s/.../exec" value="' + escHtml(savedUrl) + '">' +
          '<div class="field-hint">URL ini menghubungkan aplikasi ke Google Sheet tempat data nilai dan pembayaran disimpan (lihat Code.gs).</div>' +
        '</div>' +
        '<div style="display:flex; gap:8px;">' +
          '<button class="btn btn-outline btn-sm" style="flex:1;" onclick="testGasFromProfil()">Tes Koneksi</button>' +
          '<button class="btn btn-primary btn-sm" style="flex:1;" onclick="saveGasFromProfil()">Simpan URL</button>' +
        '</div>' +
        '<div id="profilServerStatus"></div>' +
      '</div>' +

      '<button class="btn btn-danger-ghost btn-block" style="margin-top:6px;" onclick="confirmLogout()">' + iconLogout() + ' Keluar dari Aplikasi</button>' +
    '</div>';
}

function saveGasFromProfil(){
  var v = qs('#inpGasUrlProfil').value.trim();
  if (!v){ toast('URL belum diisi.', 'error'); return; }
  setGasUrl(v);
  toast('URL server berhasil disimpan.', 'success');
}
window.saveGasFromProfil = saveGasFromProfil;

function testGasFromProfil(){
  var v = qs('#inpGasUrlProfil').value.trim();
  if (!v){ toast('URL belum diisi.', 'error'); return; }
  setGasUrl(v);
  var box = qs('#profilServerStatus');
  box.innerHTML = '<div class="server-status"><span class="dot"></span> Menguji koneksi...</div>';
  apiCall('ping', {}).then(function(res){
    if (res && res.ok){
      box.innerHTML = '<div class="server-status"><span class="dot ok"></span> Terhubung ke server</div>';
    } else {
      box.innerHTML = '<div class="server-status"><span class="dot bad"></span> Server merespons tapi gagal</div>';
    }
  }).catch(function(){
    box.innerHTML = '<div class="server-status"><span class="dot bad"></span> Tidak dapat terhubung</div>';
  });
}
window.testGasFromProfil = testGasFromProfil;

/* ================================ EMPTY STATE ================================ */
function emptyState(icon, title, sub){
  return '<div class="empty-state section-fade">' + icon + '<div class="t">' + escHtml(title) + '</div><div class="s">' + escHtml(sub) + '</div></div>';
}
